<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>折叠床拖动交互 - r182本地版</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #6495ED 0%, #1E3A8A 50%); }
        canvas { display: block; }
        .tip { position: fixed; top: 10px; left: 10px; color: #fff; font-size: 14px; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "./three.module.js"
        }
    }
    </script>
</head>
<body>
    <div class="tip">鼠标拖动床尾床体自动展开/折叠动画演示</div>
    <script type="module">
        // ✅ 适配r182：使用importmap别名
        import * as THREE from 'three';
        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
        import { DRACOLoader } from './jsm/loaders/DRACOLoader.js';
        import { DragControls } from './jsm/controls/DragControls.js';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';

        // 1. 初始化场景/相机/渲染器
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        document.body.appendChild(renderer.domElement);

        // 相机位置（45度侧视，模型下移）
        camera.position.set(3000, 1500, 3000);
        camera.lookAt(0,0,0);

        // 2. 增强灯光系统（提高模型质感）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        // 主光源
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight1.position.set(2000, 4000, 3000);
        dirLight1.castShadow = true;
        scene.add(dirLight1);
        
        // 补光1
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight2.position.set(-2000, 3000, -2000);
        scene.add(dirLight2);
        
        // 补光2（侧光，增加立体感）
        const dirLight3 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight3.position.set(3000, 2000, -1000);
        scene.add(dirLight3);
        
        // 轮廓光（背光，突出边缘）
        const rimLight = new THREE.DirectionalLight(0xffffff, 0.6);
        rimLight.position.set(0, 1500, -3000);
        scene.add(rimLight);

        // 3. 轨道控制器（r182用法不变）
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        // 调整控制方式：中键平移，右键旋转
        orbitControls.mouseButtons = {
            LEFT: THREE.MOUSE.ROTATE,
            MIDDLE: THREE.MOUSE.PAN,
            RIGHT: THREE.MOUSE.ROTATE
        };
        
        // 4. 移动端触摸支持
        orbitControls.enableTouch = true;
        orbitControls.touches = {
            ONE: THREE.TOUCH.ROTATE,
            TWO: THREE.TOUCH.DOLLY_PAN
        };

        // 4. 核心变量
        let bedA, bedB, bedC, bedD, bedF, bedH, bedG, baseE;
        let bedBPivotDriver = null, bedDPivotDriver = null, bedFPivotDriver = null, bedHPivotDriver = null;
        let bedCPivotDriver = null, bedGPivotDriver = null;
        let progress = 0; // 展开进度0~1
        const totalMoveDistance = 1242; // 床尾总移动距离
        let isDragging = false; // 是否正在拖动
        
        // 拖动相关变量（基于固定世界Y轴）
        let dragPlane;
        let dragPlaneNormal;
        let startWorldPos;
        let startBedAPos;
        // 床板绕转的枢轴点（按你这次描述的编号）
        // KeyShot 只绑定一个枢轴不影响 glb 里多个 lianjieX 点的可读性
        const BED_PIVOT_MAP = {
            bedB: 'lianjie2',
            bedD: 'lianjie3',
            bedF: 'lianjie6',
            bedH: 'lianjie7'
        };

        // 回退用：如果枢轴驱动组没创建成功，就用连接件对应的“枢轴点”近似
        // 让 bedB/bedF 的回退枢轴尽量与 BED_PIVOT_MAP 对齐
        const CONNECTOR_PIVOT_MAP = {
            bedC: BED_PIVOT_MAP.bedB,
            bedG: BED_PIVOT_MAP.bedF
        };
        /** 枢轴空物体名称（glTF 区分大小写；查找时会做不区分大小写匹配） */
        const SHUZHOU_NAME = 'shuzhou';
        /**
         * 连接件另一接点（安装点/限位点）。KeyShot 只能绑一个「枢轴」不影响 glTF：
         * 只要在导出模型里把**第二个**空物体仍挂在 bedC/bedG 下（或与连接件同级），并命名为下列之一即可；
         * Three.js 会读场景树，无需在 KeyShot 里绑定。若你的命名不同，把字符串加进数组。
         * 当前动画仍只用 SHUZHOU 做绕轴位移修正；第二接点仅缓存，供以后闭链约束或核对。
         */
        const CONNECTOR_OTHER_POINT_NAMES = ['lianjie', 'jiedian', 'guadian', 'mount', 'jie2'];

        /** 在 root 子树内（含 root）按名称不区分大小写查找第一个节点 */
        function findNodeByNameCaseInsensitive(root, name) {
            const nl = name.toLowerCase();
            let found = null;
            root.traverse((obj) => {
                if (found) return;
                if (obj.name && obj.name.toLowerCase() === nl) found = obj;
            });
            return found;
        }

        /** 用指定点名创建旋转驱动组：把床板 attach 到该组，实现“真正绑定到枢轴点” */
        function setupPivotDriver(rotatingObj, pivotName, rootModel) {
            if (!rotatingObj || !pivotName || !rootModel || !rotatingObj.parent) return null;
            const pivotObj = findNodeByNameCaseInsensitive(rootModel, pivotName);
            if (!pivotObj) {
                console.warn(`未找到枢轴点 ${pivotName}，无法为 ${rotatingObj.name} 创建驱动组`);
                return null;
            }
            const parent = rotatingObj.parent;
            parent.updateWorldMatrix(true, true);
            pivotObj.updateWorldMatrix(true, true);
            rotatingObj.updateWorldMatrix(true, true);

            const pivotWorld = new THREE.Vector3();
            pivotObj.getWorldPosition(pivotWorld);
            // 枢轴点在 rotatingObj 局部坐标中的位置（attach 前计算，作为后续把枢轴对齐到 driver 原点的依据）
            const pivotLocalInRotating = pivotWorld.clone();
            rotatingObj.worldToLocal(pivotLocalInRotating);
            const pivotLocalInParent = pivotWorld.clone();
            parent.worldToLocal(pivotLocalInParent);

            const driver = new THREE.Group();
            driver.name = `${rotatingObj.name}_pivot_driver`;
            driver.position.copy(pivotLocalInParent);
            // 让驱动组朝向与 rotatingObj 在 parent 坐标下的局部朝向一致
            // 这样“绕 driver 本地 x 轴旋转”才和原本绕 rotatingObj.rotation.x 的方向一致
            const parentWorldQuat = new THREE.Quaternion();
            const objWorldQuat = new THREE.Quaternion();
            parent.getWorldQuaternion(parentWorldQuat);
            rotatingObj.getWorldQuaternion(objWorldQuat);
            const parentInv = parentWorldQuat.clone().invert();
            const objLocalQuat = objWorldQuat.clone().premultiply(parentInv);
            driver.quaternion.copy(objLocalQuat);
            parent.add(driver);
            driver.updateWorldMatrix(true, true);

            driver.attach(rotatingObj); // 保持世界位姿不变，改为由 driver 驱动

            // 将 rotatingObj 的局部平移改为：使得枢轴点（pivotLocalInRotating）落在 driver 的原点
            // 公式：pivot_in_driver = rotatingObj.position + rotatingObj.quaternion * pivotLocalInRotating = 0
            const rP = pivotLocalInRotating.clone().applyQuaternion(rotatingObj.quaternion);
            rotatingObj.position.copy(rP.multiplyScalar(-1));

            // 记录：在“挂到驱动组之后”的局部初始朝向
            // 后续动画直接改 rotatingObj.rotation.x，就能稳定绕对齐后的枢轴转动。
            rotatingObj.userData.animInitialEuler = rotatingObj.rotation.clone();

            driver.userData.initialQuat = driver.quaternion.clone();
            console.log(`已绑定 ${rotatingObj.name} 到枢轴 ${pivotName}`);
            return driver;
        }

        /**
         * 枢轴节点应对应在「连接件」的局部原点或边上：在 glb 里最稳妥是挂到 bedC / bedG 下面（任意深度子级）；
         * 若 KeyShot 把空物体导出为与 bedC 同级（均在 bedB 下），也会尝试在同父级兄弟里按名称匹配。
         */
        function findShuzhouPivot(connectorObj) {
            let sz = findNodeByNameCaseInsensitive(connectorObj, SHUZHOU_NAME);
            if (!sz && connectorObj.parent) {
                for (const ch of connectorObj.parent.children) {
                    if (ch === connectorObj) continue;
                    if (ch.name && ch.name.toLowerCase() === SHUZHOU_NAME.toLowerCase()) {
                        sz = ch;
                        break;
                    }
                }
            }
            return sz;
        }

        /** 在连接件子树或「与连接件同父」的兄弟里按名查找（与枢轴查找规则一致） */
        function findNamedUnderConnectorOrSibling(connectorObj, name) {
            let n = findNodeByNameCaseInsensitive(connectorObj, name);
            if (!n && connectorObj.parent) {
                for (const ch of connectorObj.parent.children) {
                    if (ch === connectorObj) continue;
                    if (ch.name && ch.name.toLowerCase() === name.toLowerCase()) {
                        n = ch;
                        break;
                    }
                }
            }
            return n;
        }

        /** 缓存第二接点在连接件局部坐标中的位置（不参与 applyHingeRotation，仅数据） */
        function cacheConnectorSecondPoint(connectorObj, pivotObj) {
            delete connectorObj.userData.connectorSecondInConnectorLocal;
            delete connectorObj.userData.connectorSecondUsedName;
            for (const nm of CONNECTOR_OTHER_POINT_NAMES) {
                const n = findNamedUnderConnectorOrSibling(connectorObj, nm);
                if (n && n !== pivotObj) {
                    connectorObj.updateWorldMatrix(true, true);
                    const w = new THREE.Vector3();
                    n.getWorldPosition(w);
                    const inLocal = w.clone();
                    connectorObj.worldToLocal(inLocal);
                    connectorObj.userData.connectorSecondInConnectorLocal = inLocal;
                    connectorObj.userData.connectorSecondUsedName = nm;
                    console.log(
                        '连接件第二接点「' + nm + '」→',
                        connectorObj.name,
                        '局部: (' + inLocal.x.toFixed(2) + ',' + inLocal.y.toFixed(2) + ',' + inLocal.z.toFixed(2) + ')；无需 KeyShot 绑定，glb 有节点即可'
                    );
                    return;
                }
            }
        }

        /**
         * KeyShot 里没有空物体时，用小圆形代替约束点：
         * 从全模型中收集命名为 lianjie1..lianjie8 的点对象，
         * 优先使用 CONNECTOR_PIVOT_MAP 固定指定的点名作为 hinge pivot。
         * 若固定点缺失，再按它们到 connector(bedC/bedG) 的距离排序，取「第二近」回退。
         *
         * 目的：把 bedB/bedF 的绕转中心从几何中心修正到连接件的约束点附近，
         * 从而减少厚板展开过程的穿插。
         *
         * 转动后满足：父空间中铰接点不动 → t1 = t0 + R0·p − R1·p
         */
        function cacheHingeFromConnector(rotatingObj, connectorObj, rootModel) {
            if (!rotatingObj) return;
            rotatingObj.userData.animInitialEuler = rotatingObj.rotation.clone();
            rotatingObj.userData.hingeInitialPosition = rotatingObj.position.clone();

            rotatingObj.userData.hingePivotLocal = null;
            rotatingObj.userData.hingePivotSource = null;

            if (!connectorObj || !rootModel) return;

            const connectorWorldPos = new THREE.Vector3();
            connectorObj.updateWorldMatrix(true, true);
            connectorObj.getWorldPosition(connectorWorldPos);

            const LIANJIE_RE = /^lianjie\d+$/i;
            const lianjieObjs = [];
            rootModel.traverse((obj) => {
                if (!obj.name) return;
                if (LIANJIE_RE.test(obj.name)) lianjieObjs.push(obj);
            });

            if (lianjieObjs.length === 0) {
                console.warn('未在全模型中找到命名为 lianjie1..lianjieN 的点对象');
                return;
            }

            const fixedPivotName = CONNECTOR_PIVOT_MAP[connectorObj.name];
            let pivot = null;
            if (fixedPivotName) {
                pivot = lianjieObjs.find((o) => o.name && o.name.toLowerCase() === fixedPivotName.toLowerCase()) || null;
                if (!pivot) {
                    console.warn(`连接件 ${connectorObj.name} 的固定枢轴 ${fixedPivotName} 未找到，回退到距离策略`);
                }
            }

            // 回退：按与 connector 原点的距离排序。通常第一个是「坐标原点那点」，第二个更可能是「约束枢轴那点」
            const scored = lianjieObjs.map((o) => {
                const wp = new THREE.Vector3();
                o.getWorldPosition(wp);
                return { obj: o, dist: wp.distanceTo(connectorWorldPos), wp };
            });
            scored.sort((a, b) => a.dist - b.dist);
            if (!pivot) {
                const pickIndex = 1; // 第二近
                pivot = scored.length > pickIndex ? scored[pickIndex].obj : scored[0].obj;
            }
            const pivotName = pivot?.name;

            if (!pivot) return;

            rotatingObj.updateWorldMatrix(true, true);
            const p = new THREE.Vector3();
            pivot.getWorldPosition(p);
            rotatingObj.worldToLocal(p);
            rotatingObj.userData.hingePivotLocal = p;
            rotatingObj.userData.hingePivotSource = pivotName;

            // 打印前几名，方便你确认 lianjie 编号选得是否正确
            const preview = scored.slice(0, 4).map((s) => `${s.obj.name}:${s.dist.toFixed(2)}`).join(' , ');
            console.log(
                `枢轴点选择(按距离): connector=${connectorObj.name} rotating=${rotatingObj.name} pivot=${pivotName} 预测前4: ${preview}`
            );
        }

        /** deltaAngleX：相对初始姿态绕局部 X 的转角（弧度），与原先 bedB/bedF 的 rotation.x 动画增量一致 */
        function applyHingeRotation(rotatingObj, deltaAngleX) {
            const e0 = rotatingObj.userData.animInitialEuler;
            if (!e0) {
                rotatingObj.rotation.x = deltaAngleX;
                return;
            }
            const order = rotatingObj.rotation.order;
            const R0 = new THREE.Quaternion().setFromEuler(e0, order);
            const e1 = new THREE.Euler(e0.x + deltaAngleX, e0.y, e0.z, order);
            const R1 = new THREE.Quaternion().setFromEuler(e1, order);
            const p = rotatingObj.userData.hingePivotLocal;
            const t0 = rotatingObj.userData.hingeInitialPosition;
            if (!p || !t0) {
                rotatingObj.position.copy(t0);
                rotatingObj.quaternion.copy(R1);
                return;
            }
            const t1 = t0.clone()
                .add(p.clone().applyQuaternion(R0))
                .sub(p.clone().applyQuaternion(R1));
            rotatingObj.position.copy(t1);
            rotatingObj.quaternion.copy(R1);
        }

        // 5. 加载GLB模型（必须加./，r182路径规则不变）
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('./jsm/libs/draco/');

        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);
        loader.load(
            './bed.glb', // 替换为实际模型名，比如./bed_model.glb
            (gltf) => {
                const model = gltf.scene;
                scene.add(model);
                console.log('✅ r182模型加载成功！');

                // 计算模型包围盒
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                console.log('模型尺寸:', size);
                console.log('模型中心点:', center);

                // 调整模型初始位置（居中）
                model.position.set(-center.x, -center.y, -center.z);
                console.log('模型位置调整为:', model.position);

                // 相机位置（45度侧视，确保模型在视野内）
                const maxDim = Math.max(size.x, size.y, size.z);
                let cameraDistance = maxDim * 1.8;
                camera.position.set(cameraDistance, cameraDistance * 1.2, cameraDistance);
                camera.lookAt(0, 0, 0);
                orbitControls.target.set(0, 0, 0);
                console.log('相机位置:', camera.position);
                console.log('相机距离:', cameraDistance);
                console.log('模型中心点:', center);
                
                // 9. 移动端适配
                function handleMobileAdaptation() {
                    const isMobile = window.innerWidth < 768;
                    const isTablet = window.innerWidth >= 768 && window.innerWidth < 1024;
                    
                    // 调整相机距离和位置
                    if (isMobile) {
                        // 移动端：更近的相机距离，更适合触摸操作
                        cameraDistance = maxDim * 1.5;
                        camera.position.set(cameraDistance, cameraDistance * 1.3, cameraDistance);
                        camera.lookAt(0, 0, 0);
                        orbitControls.target.set(0, 0, 0);
                    } else if (isTablet) {
                        // 平板端：适中的相机距离
                        cameraDistance = maxDim * 1.6;
                        camera.position.set(cameraDistance, cameraDistance * 1.2, cameraDistance);
                        camera.lookAt(0, 0, 0);
                        orbitControls.target.set(0, 0, 0);
                    } else {
                        // 桌面端：标准相机距离
                        cameraDistance = maxDim * 1.8;
                        camera.position.set(cameraDistance, cameraDistance * 1.2, cameraDistance);
                        camera.lookAt(0, 0, 0);
                        orbitControls.target.set(0, 0, 0);
                    }
                    console.log('设备类型:', isMobile ? 'Mobile' : isTablet ? 'Tablet' : 'Desktop');
                    console.log('相机位置:', camera.position);
                }
                
                // 初始适配
                handleMobileAdaptation();
                // 窗口大小变化时重新适配
                window.addEventListener('resize', handleMobileAdaptation);

                // 网格辅助线已移除

                // 获取部件（和之前命名一致）
                bedA = model.getObjectByName('bedA');
                bedB = model.getObjectByName('bedB');
                bedC = model.getObjectByName('bedC');
                bedD = model.getObjectByName('bedD');
                bedF = model.getObjectByName('bedF');
                bedH = model.getObjectByName('bedH');
                bedG = model.getObjectByName('bedG');
                baseE = model.getObjectByName('baseE');

                // 检查部件是否找到（排错用）
                const parts = { bedA, bedB, bedC, bedD, bedF, bedH, bedG, baseE };
                for (const [name, part] of Object.entries(parts)) {
                    if (part) {
                        console.log(`✅ 找到部件：${name}`);
                    } else {
                        console.error(`❌ 未找到部件：${name}，检查模型内命名！`);
                    }
                }

                // 自动检测并绑定父子结构
                function autoBindParts() {
                    console.log('开始自动检测父子关系...');
                    
                    // 与 KeyShot 导出一致：床尾链 bedA→bedB→bedC，底座 bedE→bedD/bedF，bedH→bedG 为另一侧床板
                    const parentChildMap = {
                        'bedA': ['bedB'],
                        'bedB': ['bedC'],
                        'baseE': ['bedD', 'bedF'],
                        'bedH': ['bedG']
                    };
                    
                    // 遍历映射进行绑定
                    for (const [parentName, childNames] of Object.entries(parentChildMap)) {
                        const parent = model.getObjectByName(parentName);
                        if (!parent) {
                            console.warn(`❌ 未找到父部件：${parentName}`);
                            continue;
                        }
                        
                        childNames.forEach(childName => {
                            const child = model.getObjectByName(childName);
                            if (child) {
                                // 检查子部件是否已经是父部件的子对象
                                if (child.parent !== parent) {
                                    console.log(`✅ 绑定 ${childName} 到 ${parentName}`);
                                    parent.add(child);
                                } else {
                                    console.log(`ℹ️ ${childName} 已经是 ${parentName} 的子对象`);
                                }
                            } else {
                                console.warn(`❌ 未找到子部件：${childName}`);
                            }
                        });
                    }
                }
                
                // 执行自动绑定
                autoBindParts();

                // 禁用子对象的交互（防止被拖动）
                model.traverse((child) => {
                    if (child.isMesh) {
                        if (child === bedA) {
                            child.userData.draggable = true;
                        } else {
                            child.userData.draggable = false;
                        }
                        child.userData.initialX = child.position.x;
                        child.userData.initialY = child.position.y;
                        child.userData.initialZ = child.position.z;
                    }
                });

                // 保存初始位置
                if (bedA) {
                    bedA.userData.initialX = bedA.position.x;
                    bedA.userData.initialY = bedA.position.y;
                    bedA.userData.initialZ = bedA.position.z;
                    console.log('bedA 初始位置:', bedA.position);
                    console.log('bedA 类型:', bedA.type);
                    console.log('bedA 是否是 Object3D:', bedA instanceof THREE.Object3D);
                }
                if (baseE) {
                    baseE.userData.initialX = baseE.position.x;
                    baseE.userData.initialY = baseE.position.y;
                    baseE.userData.initialZ = baseE.position.z;
                    console.log('baseE 初始位置:', baseE.position);
                }

                // 使用 KeyShot 导出的约束点圆形：lianjie1..lianjie8
                // 创建真正的枢轴驱动组，让 bedB/bedD/bedF/bedH 围绕对应枢轴点旋转
                cacheHingeFromConnector(bedB, bedC, model);
                cacheHingeFromConnector(bedF, bedG, model);

                bedBPivotDriver = setupPivotDriver(bedB, BED_PIVOT_MAP.bedB, model);
                bedDPivotDriver = setupPivotDriver(bedD, BED_PIVOT_MAP.bedD, model);
                bedFPivotDriver = setupPivotDriver(bedF, BED_PIVOT_MAP.bedF, model);
                bedHPivotDriver = setupPivotDriver(bedH, BED_PIVOT_MAP.bedH, model);
                // 连接件也用同样的枢轴驱动旋转（bedC/bedG 的约束枢轴：lianjie3 / lianjie7）
                if (bedC) bedCPivotDriver = setupPivotDriver(bedC, 'lianjie3', model);
                if (bedG) bedGPivotDriver = setupPivotDriver(bedG, 'lianjie7', model);

                [bedD, bedH, bedG].forEach((o) => {
                    if (o && o.userData.animInitialEuler === undefined) {
                        o.userData.animInitialEuler = o.rotation.clone();
                        console.log(`✅ 为 ${o.name} 设置初始旋转角度:`, o.rotation);
                    }
                });

                console.log('准备创建 DragControls...');
                
                // 只允许拖动 bedA 本身，视角控制由轨道控制器处理
                const draggableObjects = [bedA];
                
                // 拖动控制器（只包含 bedA）- 禁用，使用自定义拖动逻辑
                const dragControls = new DragControls(draggableObjects, camera, renderer.domElement);
                dragControls.enabled = false; // 禁用DragControls，使用自定义拖动逻辑
                // 命中子 Mesh 时只改子物体位置再同步到 bedA；勿用 transformGroup（会选到最外层 Group，整模被拖走）
                dragControls.recursive = true;
                dragControls.transformGroup = false;
                
                // 辅助函数：检查对象是否是 bedA 的后代
                function isDescendant(parent, child) {
                    let node = child.parent;
                    while (node) {
                        if (node === parent) {
                            return true;
                        }
                        node = node.parent;
                    }
                    return false;
                }
                
                // 拖动状态变量
                let isDragging = false;
                let dragStartY = 0;
                let dragStartMouseY = 0;
                
                // 鼠标按下事件
                renderer.domElement.addEventListener('mousedown', (event) => {
                    // 检查是否点击在 bedA 或其子部件上
                    const raycaster = new THREE.Raycaster();
                    const mouse = new THREE.Vector2();
                    const rect = renderer.domElement.getBoundingClientRect();
                    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
                    
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects([bedA], true);
                    
                    if (intersects.length > 0) {
                        // 检查点击的是否是 bedA 或其后代
                        let clickedObject = intersects[0].object;
                        let isBedADescendant = false;
                        
                        // 向上遍历父节点，检查是否是 bedA 的后代
                        while (clickedObject) {
                            if (clickedObject === bedA) {
                                isBedADescendant = true;
                                break;
                            }
                            clickedObject = clickedObject.parent;
                        }
                        
                        if (isBedADescendant) {
                            isDragging = true;
                            orbitControls.enabled = false;
                            dragStartY = bedA.position.y;
                            dragStartMouseY = event.clientY;
                            console.log('开始拖动 bedA，起始位置:', dragStartY);
                        }
                    }
                });
                
                // 鼠标移动事件
                renderer.domElement.addEventListener('mousemove', (event) => {
                    if (isDragging) {
                        // 计算鼠标移动距离（沿着展开方向：Y轴）
                        const deltaY = dragStartMouseY - event.clientY;
                        
                        // 计算bedA的新位置（这里可以根据需要调整灵敏度）
                        let newBedAY = dragStartY + deltaY * 18; // 调整灵敏度
                        
                        // 严格限制移动范围：只能向下拖动，最大距离 1242mm
                        const minY = bedA.userData.initialY - totalMoveDistance;
                        const maxY = bedA.userData.initialY;
                        
                        // 强制限制 bedA 的位置
                        newBedAY = Math.max(minY, Math.min(maxY, newBedAY));
                        
                        // 直接设置 bedA 的位置
                        bedA.position.set(
                            bedA.userData.initialX,
                            newBedAY,
                            bedA.userData.initialZ
                        );
                        
                        // 计算进度
                        const bedADeltaY = newBedAY - bedA.userData.initialY;
                        progress = Math.max(0, Math.min(1, Math.abs(bedADeltaY) / totalMoveDistance));
                        
                        // 更新动画
                        updateBedAnimation();
                    }
                });
                
                // 鼠标释放事件
                renderer.domElement.addEventListener('mouseup', () => {
                    if (isDragging) {
                        isDragging = false;
                        orbitControls.enabled = true;
                        console.log('结束拖动 bedA');
                    }
                });
                
                // 鼠标离开事件
                renderer.domElement.addEventListener('mouseleave', () => {
                    if (isDragging) {
                        isDragging = false;
                        orbitControls.enabled = true;
                        console.log('结束拖动 bedA');
                    }
                });
                
                // 触摸开始事件（手机端支持）
                renderer.domElement.addEventListener('touchstart', (event) => {
                    if (event.touches.length === 1) {
                        // 检查是否点击在 bedA 或其子部件上
                        const raycaster = new THREE.Raycaster();
                        const mouse = new THREE.Vector2();
                        const rect = renderer.domElement.getBoundingClientRect();
                        const touch = event.touches[0];
                        mouse.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
                        mouse.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
                        
                        raycaster.setFromCamera(mouse, camera);
                        const intersects = raycaster.intersectObjects([bedA], true);
                        
                        if (intersects.length > 0) {
                            // 检查点击的是否是 bedA 或其后代
                            let clickedObject = intersects[0].object;
                            let isBedADescendant = false;
                            
                            // 向上遍历父节点，检查是否是 bedA 的后代
                            while (clickedObject) {
                                if (clickedObject === bedA) {
                                    isBedADescendant = true;
                                    break;
                                }
                                clickedObject = clickedObject.parent;
                            }
                            
                            if (isBedADescendant) {
                                isDragging = true;
                                orbitControls.enabled = false;
                                dragStartY = bedA.position.y;
                                dragStartMouseY = touch.clientY;
                                event.preventDefault();
                                console.log('开始拖动 bedA（触摸），起始位置:', dragStartY);
                            }
                        }
                    }
                }, { passive: false });
                
                // 触摸移动事件（手机端支持）
                renderer.domElement.addEventListener('touchmove', (event) => {
                    if (isDragging && event.touches.length === 1) {
                        const touch = event.touches[0];
                        
                        // 计算触摸移动距离（沿着展开方向：Y轴）
                        const deltaY = dragStartMouseY - touch.clientY;
                        
                        // 计算bedA的新位置（这里可以根据需要调整灵敏度）
                        let newBedAY = dragStartY + deltaY * 18; // 调整灵敏度
                        
                        // 严格限制移动范围：只能向下拖动，最大距离 1242mm
                        const minY = bedA.userData.initialY - totalMoveDistance;
                        const maxY = bedA.userData.initialY;
                        
                        // 强制限制 bedA 的位置
                        newBedAY = Math.max(minY, Math.min(maxY, newBedAY));
                        
                        // 直接设置 bedA 的位置
                        bedA.position.set(
                            bedA.userData.initialX,
                            newBedAY,
                            bedA.userData.initialZ
                        );
                        
                        // 计算进度
                        const bedADeltaY = newBedAY - bedA.userData.initialY;
                        progress = Math.max(0, Math.min(1, Math.abs(bedADeltaY) / totalMoveDistance));
                        
                        // 更新动画
                        updateBedAnimation();
                        
                        event.preventDefault();
                    }
                }, { passive: false });
                
                // 触摸结束事件（手机端支持）
                renderer.domElement.addEventListener('touchend', (event) => {
                    if (isDragging) {
                        isDragging = false;
                        orbitControls.enabled = true;
                        console.log('结束拖动 bedA（触摸）');
                    }
                });
                
                // 触摸取消事件（手机端支持）
                renderer.domElement.addEventListener('touchcancel', (event) => {
                    if (isDragging) {
                        isDragging = false;
                        orbitControls.enabled = true;
                        console.log('取消拖动 bedA（触摸）');
                    }
                });

            },
            (xhr) => {
                // 加载进度
                console.log(`模型加载中：${Math.round(xhr.loaded / xhr.total * 100)}%`);
            },
            (error) => {
                // 加载错误提示
                console.error('❌ 模型加载失败：', error);
            }
        );

        // 6. 核心动画逻辑（r182旋转/位移API无变化）
        function updateBedAnimation() {
            if (!bedB || !bedD || !bedF || !bedH || !baseE) {
                console.log('缺少部件:', { bedB, bedD, bedF, bedH, baseE });
                return;
            }

            console.log('updateBedAnimation 执行，progress:', progress);

            // 底座E移动：相对于初始位置的偏移
            const baseInitialY = baseE.userData.initialY || 0;
            const bedInitialY = bedA.userData.initialY || 0;
            baseE.position.y = baseInitialY + (bedA.position.y - bedInitialY) * 0.5;
            baseE.position.x = baseE.userData.initialX;
            baseE.position.z = baseE.userData.initialZ;
            console.log('baseE.position.y:', baseE.position.y);

            // 基于Y轴移动距离计算旋转角度
            // 床板长度311毫米，展开后活动端沿Y轴移动311毫米
            const bedLength = 311; // 床板长度（毫米）
            const bedAMovement = bedA.position.y - bedInitialY; // bedA的Y轴移动距离
            const movementRatio = Math.abs(bedAMovement) / 1242; // 移动距离比例（最大移动距离1242毫米）
            
            // 计算旋转角度：使用反正弦函数，基于床板活动端的Y轴移动距离
            // 当活动端移动距离为bedLength时，旋转角度为90度（π/2）
            const targetMovement = movementRatio * bedLength;
            const ang = Math.asin(targetMovement / bedLength); // 旋转角度（弧度）
            console.log('bedAMovement:', bedAMovement, 'movementRatio:', movementRatio, 'ang:', ang);

            // 旋转床板，确保连接点对齐
            // bedB 绕 lianjie2 旋转
            const eB = bedB.userData.animInitialEuler;
            if (eB) bedB.rotation.set(eB.x - ang, eB.y, eB.z, bedB.rotation.order);
            else applyHingeRotation(bedB, -ang);

            // bedC 绕 lianjie3 旋转
            if (bedC && bedC.userData.animInitialEuler) {
                const eC = bedC.userData.animInitialEuler;
                bedC.rotation.set(eC.x + ang, eC.y, eC.z, bedC.rotation.order);
            }

            // bedD 绕 lianjie3 旋转
            const eD = bedD.userData.animInitialEuler;
            if (eD) bedD.rotation.set(eD.x - ang, eD.y, eD.z, bedD.rotation.order);
            else bedD.rotation.x = -ang;

            // bedF 绕 lianjie6 旋转
            const eF = bedF.userData.animInitialEuler;
            if (eF) bedF.rotation.set(eF.x - ang, eF.y, eF.z, bedF.rotation.order);
            else applyHingeRotation(bedF, -ang);

            // bedG 绕 lianjie7 旋转
            if (bedG && bedG.userData.animInitialEuler) {
                const eG = bedG.userData.animInitialEuler;
                bedG.rotation.set(eG.x - ang, eG.y, eG.z, bedG.rotation.order);
            }

            // bedH 绕 lianjie7 旋转
            const eH = bedH.userData.animInitialEuler;
            if (eH) bedH.rotation.set(eH.x + ang, eH.y, eH.z, bedH.rotation.order);
            else bedH.rotation.x = ang;

            // 调整 bedC 和 bedG 的位置，确保连接点对齐
            if (bedC && bedC.userData.initialY) {
                // 计算 bedC 的位置，确保连接点对齐
                const bedCOffset = Math.sin(ang) * bedLength;
                if (bedC.position) {
                    bedC.position.y = bedC.userData.initialY + bedCOffset;
                }
            }

            if (bedG && bedG.userData.initialY) {
                // 计算 bedG 的位置，确保连接点对齐
                const bedGOffset = Math.sin(ang) * bedLength;
                if (bedG.position) {
                    bedG.position.y = bedG.userData.initialY + bedGOffset;
                }
            }

            // console.log('bedB.rotation.x:', bedB.rotation.x, 'bedD.rotation.x:', bedD.rotation.x);
        }

        // 7. 渲染循环（r182 requestAnimationFrame用法不变）
        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 8. 窗口自适应（r182适配逻辑不变）
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
        
        // 9. 触摸事件优化
        let touchStartY = 0;
        let isDraggingBedA = false;
        
        // 触摸开始事件
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartY = e.touches[0].clientY;
                // 这里可以添加触摸位置检测，判断是否点击在 bedA 上
            }
        });
        
        // 触摸移动事件
        renderer.domElement.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                const touchCurrentY = e.touches[0].clientY;
                const touchDeltaY = touchCurrentY - touchStartY;
                
                // 这里可以添加触摸拖动 bedA 的逻辑
                // 类似鼠标拖动的实现
            }
        });
        
        // 触摸结束事件
        renderer.domElement.addEventListener('touchend', () => {
            isDraggingBedA = false;
        });
    </script>
